services:
  frontend:
    build:
      context: ./front
    depends_on:
      - backend
    ports:
      - "127.0.0.1:4100:80"
    restart: unless-stopped

  backend:
    build:
      context: ./back
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:-change_me}
      DATABASE_URL: postgresql://${POSTGRES_USER:-myexperiences}:${POSTGRES_PASSWORD:-myexperiences}@database:5432/${POSTGRES_DB:-myexperiences}?serverVersion=16&charset=utf8
    ports:
      - "127.0.0.1:4200:80"
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myexperiences}
      POSTGRES_USER: ${POSTGRES_USER:-myexperiences}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myexperiences}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myexperiences} -d ${POSTGRES_DB:-myexperiences}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - database_data:/var/lib/postgresql/data

volumes:
  database_data:
