security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_ORGANIZER: ROLE_USER
        ROLE_ADMIN: [ROLE_USER, ROLE_ORGANIZER]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            stateless: true
            provider: app_user_provider
            access_token:
                token_handler: App\Security\ApiAccessTokenHandler
                failure_handler: App\Security\ApiAuthenticationFailureHandler

    access_control:
        - { path: ^/api/me$, roles: ROLE_USER }
        - { path: ^/api/auth/logout$, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
